root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main.exe ."
  bin = "tmp/main.exe"
  entrypoint = "tmp/main.exe"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_ext = ["tmp", "vendor"]
  include_dir = []
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  poll = false
  poll_interval = 0
  delay = 0
  stop_on_root = false
  send_interrupt = false
  kill_delay = "0s"

[log]
  time = true
  main_only = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
